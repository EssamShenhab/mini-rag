services:
    # FastAPI Application
    fastapi:
        build:
            context: ..
            dockerfile: docker/minirag/Dockerfile
        container_name: fastapi
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "8000:8000"
        volumes:
            - fastapi_data:/app/assets
        networks:
            - backend
        restart: unless-stopped
        depends_on:
            pgvector:
                condition: service_healthy
        env_file:
            - ./env/.env.app

    # Celery Worker
    celery-worker:
        build:
            context: ..
            dockerfile: docker/minirag/Dockerfile
        container_name: celery-worker
        volumes:
            - fastapi_data:/app/assets
        networks:
            - backend
        restart: always
        depends_on:
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
            pgvector:
                condition: service_healthy
        env_file:
            - ./env/.env.app
        command:
            [
                "python",
                "-m",
                "celery",
                "-A",
                "celery_app",
                "worker",
                "--queues=default,file_processing,data_indexing",
                "--loglevel=info",
            ]

        # Celery Beat Scheduler
    celery-beat:
        build:
            context: ..
            dockerfile: docker/minirag/Dockerfile
        container_name: celery-beat
        volumes:
            - fastapi_data:/app/assets
            - celery_beat_data:/app/celerybeat
        networks:
            - backend
        restart: always
        depends_on:
            rabbitmq:
                condition: service_healthy
            redis:
                condition: service_healthy
        env_file:
            - ./env/.env.app
        command:
            [
                "python",
                "-m",
                "celery",
                "-A",
                "celery_app",
                "beat",
                "--loglevel=info",
            ]

    # Flower Dashboard
    flower:
        build:
            context: ..
            dockerfile: docker/minirag/Dockerfile
        container_name: flower
        ports:
            - "5555:5555"
        networks:
            - backend
        restart: always
        depends_on:
            rabbitmq:
                condition: service_healthy
            celery-worker:
                condition: service_healthy
        env_file:
            - ./env/.env.app
        command:
            [
                "python",
                "-m",
                "celery",
                "-A",
                "celery_app",
                "flower",
                "--conf=flowerconfig.py",
            ]

    # Nginx Service
    nginx:
        image: nginx:stable-alpine3.23-perl
        container_name: nginx
        ports:
            - "80:80"
        volumes:
            - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
        depends_on:
            - fastapi
        networks:
            - backend
        restart: unless-stopped

    # Postgres (pgvector)
    pgvector:
        image: pgvector/pgvector:0.8.2-pg18-bookworm
        container_name: pgvector
        ports:
            - "5400:5432"
        volumes:
            - "pgvector:/var/lib/postgresql"
        env_file:
            - ./env/.env.postgres
        networks:
            - backend
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    # Qdrant (VectorDB)
    qdrant:
        image: qdrant/qdrant:v1.17
        container_name: qdrant
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - "qdrant_data:/qdrant/storage"
        networks:
            - backend
        restart: unless-stopped

    # Prometheus Monitoring
    prometheus:
        image: prom/prometheus:v3
        container_name: prometheus
        ports:
            - "9090:9090"
        volumes:
            - "prometheus_data:/prometheus"
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        networks:
            - backend
        restart: unless-stopped
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"

    # Grafana Dashboard
    grafana:
        image: grafana/grafana:12.3-ubuntu
        container_name: grafana
        ports:
            - "4000:3000"
        volumes:
            - grafana_data:/var/lib/grafana
        env_file:
            - ./env/.env.grafana
        depends_on:
            - prometheus
        networks:
            - backend
        restart: unless-stopped

    # Node Exporter for system metrics
    node-exporter:
        image: prom/node-exporter:v1.10.2
        container_name: node-exporter
        ports:
            - "9100:9100"
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - "--path.procfs=/host/proc"
            - "--path.rootfs=/rootfs"
            - "--path.sysfs=/host/sys"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
        networks:
            - backend
        restart: unless-stopped

    # PostgreSQL Exporterfor Postgres metrics
    postgres-exporter:
        image: prometheuscommunity/postgres-exporter:latest
        container_name: pgvector_exporter
        ports:
            - "9187:9187"
        env_file:
            - ./env/.env.postgres-exporter
        depends_on:
            - pgvector
        networks:
            - backend
        restart: unless-stopped

    # RabbitMQ Message Broker
    rabbitmq:
        image: rabbitmq:4.2.5-management-alpine
        container_name: rabbitmq
        ports:
            - "5672:5672" # AMQP port
            - "15672:15672" # Management UI port
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
            - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
        env_file:
            - ./env/.env.rabbitmq
        networks:
            - backend
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            timeout: 10s
            retries: 5

    # Redis (Results Backend & Cache)
    redis:
        image: redis:8.0.6-alpine
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        env_file:
            - ./env/.env.redis
        networks:
            - backend
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            timeout: 10s
            retries: 5
        command:
            [
                "redis-server",
                "--appendonly",
                "yes",
                "--requirepass",
                "${REDIS_PASSWORD:-minirag_redis_2222}",
            ]

networks:
    backend:
        driver: bridge

volumes:
    fastapi_data:
    pgvector:
    qdrant_data:
    prometheus_data:
    grafana_data:
    rabbitmq_data:
    redis_data:
    celery_beat_data:
